<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{SKILL_NAME}} · 系统结构图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════
     Swiss 极简设计系统 · 蓝+红双色 · 矩形圆角
     几何连线 · 高信息密度 · 标准化步骤字段
     支持: 线性/分支/并行/回环/阶段分组/流程嵌入
     ═══════════════════════════════════════════════════ */

  :root{
    --blue:#002FA7; --blue-rgb:0,47,167;
    --blue-light:rgba(0,47,167,.10); --blue-mid:rgba(0,47,167,.22);
    --red:#CC3333; --red-rgb:204,51,51;
    --red-light:rgba(204,51,51,.08); --red-mid:rgba(204,51,51,.20);
    --paper:#FAFAF8; --paper-rgb:250,250,248;
    --ink:#0A0A0A;
    --grey-0:#EEEEE8; --grey-1:#DCDCD4; --grey-2:#B8B8B0; --grey-3:#6A6A6A;
    --sans:"Inter","Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
    --mono:"JetBrains Mono","IBM Plex Mono","SF Mono","Consolas",monospace;
    --radius:10px; --radius-sm:6px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{max-width:1600px;margin:0 auto;padding:36px 44px 60px}

  /* ═══ Hero · 实心蓝底标题栏 ═══ */
  .hero{
    background:var(--blue);color:#fff;
    border-radius:var(--radius);
    padding:40px 44px;margin-bottom:32px;
    display:grid;grid-template-columns:1fr auto;gap:32px;align-items:end;
  }
  .hero .kicker{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,255,255,.50);margin-bottom:4px}
  .hero h1{font-size:clamp(32px,3.5vw,48px);font-weight:600;letter-spacing:-.02em;line-height:1.08;color:#fff}
  .hero .deck{font-size:14px;color:rgba(255,255,255,.62);margin-top:6px;max-width:700px;line-height:1.55;font-weight:400}
  .hero .kpi-row{display:flex;gap:32px;align-self:end}
  .hero .kpi-row .kv{font-family:var(--mono);font-size:40px;font-weight:500;color:#fff;line-height:1;letter-spacing:-.02em}
  .hero .kpi-row .kl{font-size:11px;color:rgba(255,255,255,.50);margin-top:2px;font-weight:500}

  /* ═══ 主网格: 流水线 + 320px 侧栏 ═══ */
  .pipeline-wrap{margin-bottom:36px}
  .meta-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px}
  .meta-row .side-panel{margin:0}

  /* ═══ 流水线步骤卡片 ═══ */
  .pipeline{display:flex;flex-direction:column;align-items:stretch}

  .step-card{
    display:grid;grid-template-columns:56px 1fr auto;gap:16px;align-items:start;
    background:var(--paper);
    border:1px solid var(--grey-1);
    border-left:3px solid var(--blue);
    border-radius:var(--radius);
    padding:18px 20px;
  }
  .step-card .step-num{
    width:48px;height:48px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:20px;font-weight:600;color:var(--blue);
    background:var(--blue-light);
    border:1px solid var(--blue-mid);
    border-radius:var(--radius-sm);
    flex-shrink:0;
  }
  .step-card .step-num.gate-node{color:var(--red);background:var(--red-light);border-color:var(--red-mid)}
  .step-card .step-body{min-width:0}
  .step-card .step-body h3{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:4px;letter-spacing:-.01em}
  .step-card .step-body .step-meta{font-family:var(--mono);font-size:11px;color:var(--blue);font-weight:500;margin-bottom:6px;display:flex;gap:16px;flex-wrap:wrap}
  .step-card .step-body .step-meta .in{color:var(--grey-3)}
  .step-card .step-body .step-meta .out{color:var(--blue)}
  .step-card .step-body .step-desc{font-size:13px;color:var(--grey-3);line-height:1.55;font-weight:400}
  .step-card .step-role{font-family:var(--mono);font-size:11px;color:var(--grey-3);font-weight:500;white-space:nowrap;text-align:right;padding-top:2px}

  /* ═══ 门禁卡片 ═══ */
  .gate-card{
    background:var(--red-light);
    border:1px dashed var(--red);
    border-radius:var(--radius);
    padding:14px 18px;
    display:grid;grid-template-columns:56px 1fr;gap:16px;align-items:start;
  }
  .gate-card .gate-icon{
    width:48px;height:48px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:20px;font-weight:600;color:var(--red);
    background:var(--red-mid);
    border-radius:var(--radius-sm);
    flex-shrink:0;
  }
  .gate-card .gate-body .gtag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--red);background:var(--red-mid);padding:2px 8px;border-radius:3px;margin-bottom:4px;letter-spacing:.06em;text-transform:uppercase}
  .gate-card .gate-body .gtitle{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px}
  .gate-card .gate-body .gdetail{font-size:12px;color:var(--grey-3);line-height:1.5}

  /* ═══ 几何连线 · SVG ═══ */
  .connector{display:flex;justify-content:flex-start;padding:0 0 0 44px;height:28px}
  .connector svg{display:block}
  .connector.red{justify-content:flex-start;padding:0 0 0 44px}
  .connector.red svg line{stroke:var(--red)}
  .connector.red svg polygon{fill:var(--red)}

  /* ── 分支分叉连线 (T/Y 型) ── */
  .branch-from{height:36px;margin:0}
  .branch-from svg{display:block;width:100%;height:36px}

  /* ── 分支汇合连线 (倒 T/Y 型) ── */
  .branch-to{height:36px;margin:0}
  .branch-to svg{display:block;width:100%;height:36px}

  /* ═══ 决策节点 ═══ */
  .decision-node{
    display:grid;grid-template-columns:56px 1fr;gap:16px;align-items:center;
    background:var(--blue-light);
    border:1.5px solid var(--blue);
    border-radius:var(--radius);
    padding:16px 20px;
  }
  .decision-node .dec-icon{
    width:48px;height:48px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:24px;font-weight:600;color:var(--blue);
    background:var(--blue-mid);
    border-radius:var(--radius-sm);
    flex-shrink:0;
  }
  .decision-node .dec-body h3{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px}
  .decision-node .dec-body .dec-desc{font-size:12px;color:var(--grey-3);line-height:1.5}

  /* ═══ 分支容器 ═══ */
  .branch-split{
    display:grid;grid-template-columns:1fr 1fr;gap:24px;
  }
  .branch-split.col3{grid-template-columns:1fr 1fr 1fr}

  .branch-path{
    display:flex;flex-direction:column;gap:8px;
  }
  .branch-label{
    font-family:var(--mono);font-size:10px;font-weight:600;
    color:var(--blue);text-align:center;
    padding:4px 12px;background:var(--blue-light);
    border:1px solid var(--blue-mid);border-radius:4px;
    align-self:center;white-space:nowrap;
  }
  .branch-label.red{color:var(--red);background:var(--red-light);border-color:var(--red-mid)}

  /* ═══ 并行执行行 ═══ */
  .parallel-row{
    display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  }
  .parallel-row.col2{grid-template-columns:repeat(2,1fr)}
  .parallel-row.col4{grid-template-columns:repeat(4,1fr)}
  .parallel-card{
    background:var(--paper);
    border:1px solid var(--grey-1);
    border-radius:var(--radius);
    padding:16px;
  }
  .parallel-card .pc-num{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--blue);margin-bottom:8px}
  .parallel-card .pc-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
  .parallel-card .pc-desc{font-size:12px;color:var(--grey-3);line-height:1.45}
  .parallel-card .pc-meta{font-family:var(--mono);font-size:10px;color:var(--grey-2);margin-top:6px}

  /* ═══ 回环连线 ═══ */
  .loop-back{
    display:flex;align-items:center;gap:0;
    height:48px;margin:0;position:relative;
  }
  .loop-back .loop-path{flex:1;height:48px}
  .loop-back .loop-path svg{display:block;width:100%;height:48px}
  .loop-back .loop-label{
    position:absolute;right:80px;top:50%;transform:translateY(-50%);
    font-family:var(--mono);font-size:10px;font-weight:600;color:var(--red);
    background:var(--paper);padding:3px 10px;
    border:1px solid var(--red-mid);border-radius:4px;
    white-space:nowrap;
  }

  /* ═══ 阶段分组 ═══ */
  .phase-group{
    border:1px solid var(--grey-1);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .phase-group .phase-header{
    padding:12px 20px;
    font-family:var(--mono);font-size:11px;font-weight:600;
    letter-spacing:.04em;
    display:flex;align-items:center;gap:12px;
  }
  .phase-group .phase-header .phase-tag{
    display:inline-block;padding:2px 10px;border-radius:4px;
    font-size:10px;font-weight:600;letter-spacing:.06em;
  }
  .phase-group .phase-body{
    padding:16px 20px 20px;
    display:flex;flex-direction:column;gap:8px;
  }

  /* 蓝色阶段 */
  .phase-group.blue{border-color:var(--blue-mid)}
  .phase-group.blue .phase-header{background:var(--blue-light);color:var(--blue);border-bottom:1px solid var(--blue-mid)}
  .phase-group.blue .phase-header .phase-tag{background:var(--blue);color:#fff}

  /* 红色阶段 (门禁/阻断) */
  .phase-group.red{border-color:var(--red-mid)}
  .phase-group.red .phase-header{background:var(--red-light);color:var(--red);border-bottom:1px solid var(--red-mid)}
  .phase-group.red .phase-header .phase-tag{background:var(--red);color:#fff}

  /* ═══ 侧栏 ═══ */
  .sidebar{display:flex;flex-direction:column;gap:16px}

  .side-panel{
    background:var(--grey-0);
    border:1px solid var(--grey-1);
    border-radius:var(--radius);
    padding:18px 20px;
  }
  .side-panel h4{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--blue-mid)}

  /* ═══ 目录树 ═══ */
  .folder-tree{font-family:var(--mono);font-size:12px;line-height:2.0;color:var(--ink)}
  .folder-tree .dir{color:var(--blue);font-weight:600}
  .folder-tree .file{color:var(--grey-3)}
  .folder-tree .comment{color:var(--grey-2);font-size:10px}
  .folder-tree .row{display:flex;align-items:baseline}
  .folder-tree .row .pre{color:var(--grey-2);white-space:pre;flex-shrink:0;user-select:none;margin-right:1px}
  .folder-tree .lv1{padding-left:2px}
  .folder-tree .lv2{padding-left:18px}
  .folder-tree .lv3{padding-left:34px}

  /* ═══ 数据表 ═══ */
  .tt{width:100%;border-collapse:collapse;font-size:11px}
  .tt th{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--blue);text-align:left;padding:5px 8px;border-bottom:1px solid var(--blue-mid);letter-spacing:.06em;text-transform:uppercase}
  .tt td{padding:5px 8px;border-bottom:1px solid var(--grey-1);vertical-align:top;line-height:1.4}
  .tt .dnum{font-family:var(--mono);font-weight:600;color:var(--blue);white-space:nowrap}
  .tt .dname{font-weight:600;color:var(--ink);white-space:nowrap}
  .tt .ddesc{font-size:10px;color:var(--grey-3)}
  .tt .tnum{font-family:var(--mono);font-weight:600;color:var(--red);white-space:nowrap}
  .tt .tban{font-weight:600;color:var(--ink)}
  .tt .treason{font-size:10px;color:var(--grey-3)}

  /* ═══ 底部面板 ═══ */
  .below-panels{display:flex;flex-direction:column;gap:16px;margin-bottom:36px}

  .info-panel{
    background:var(--grey-0);
    border:1px solid var(--grey-1);
    border-radius:var(--radius);
    padding:22px 24px;
  }
  .info-panel .panel-head{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:16px;padding-bottom:6px;border-bottom:1px solid var(--blue-mid)}

  /* ═══ 网格卡片 (信念/原则/规则) ═══ */
  .card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .card-grid.col2{grid-template-columns:repeat(2,1fr)}
  .card-grid.col4{grid-template-columns:repeat(4,1fr)}
  .info-card{
    background:var(--paper);
    border:1px solid var(--grey-1);
    border-radius:var(--radius);
    padding:14px 16px;
  }
  .info-card .cn{font-family:var(--mono);font-weight:600;color:var(--blue);font-size:11px;margin-bottom:3px}
  .info-card .cs{font-size:12px;color:var(--grey-3);line-height:1.45}

  /* ═══ 红线卡片 ═══ */
  .info-card.red-line{
    border-left:3px solid var(--red);
    background:var(--red-light);
  }
  .info-card.red-line .cn{color:var(--red)}
  .info-card.red-line .cs{color:var(--grey-3)}

  /* ═══ 底部统计条 ═══ */
  .stat-bar{
    display:grid;grid-template-columns:repeat(5,1fr);gap:0;
    border-top:2px solid var(--blue);
    border-bottom:1px solid var(--grey-1);
  }
  .stat-bar .sc{
    padding:18px 20px;border-right:1px solid var(--grey-1);background:var(--grey-0);
    text-align:center;
  }
  .stat-bar .sc:last-child{border-right:none}
  .stat-bar .sc .sn{font-family:var(--mono);font-size:36px;font-weight:500;color:var(--blue);line-height:1}
  .stat-bar .sc .sl{font-size:11px;color:var(--grey-3);margin-top:3px;font-weight:500}
  .stat-bar .sc .sdetail{font-size:10px;color:var(--grey-2);margin-top:1px}

  /* ═══ 横排流程图 ═══ */
  .flow-row{display:flex;align-items:stretch;gap:0;overflow-x:auto}
  .flow-node{
    flex:1;min-width:120px;display:flex;flex-direction:column;
    background:var(--paper);
    border:1px solid var(--grey-1);
    border-radius:var(--radius);
    padding:14px 14px;
    text-align:center;
  }
  .flow-node .fn-title{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue);line-height:1.3}
  .flow-node .fn-sub{font-size:11px;color:var(--grey-3);margin-top:4px;line-height:1.4}
  .flow-node.first{background:var(--blue);border-color:var(--blue)}
  .flow-node.first .fn-title{color:var(--paper)}
  .flow-node.first .fn-sub{color:rgba(255,255,255,.65)}
  .flow-node.danger{background:var(--red-light);border-color:var(--red-mid)}
  .flow-node.danger .fn-title{color:var(--red)}
  .flow-connector{display:flex;align-items:center;justify-content:center;width:40px;flex-shrink:0}
  .flow-connector svg{display:block}

  /* ═══ 嵌入流程图 (纵向) ═══ */
  .embedded-flowchart{
    display:flex;flex-direction:column;align-items:stretch;gap:0;
    background:var(--paper);
    border:1px solid var(--grey-1);
    border-radius:var(--radius);
    padding:20px 24px;
  }
  .embedded-flowchart .fc-title{
    font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.06em;
    text-transform:uppercase;color:var(--blue);margin-bottom:16px;
    padding-bottom:8px;border-bottom:1px solid var(--blue-mid);
  }

  /* ── 流程内行 (横向排列) ── */
  .fc-row{display:flex;align-items:center;gap:0;min-height:64px}
  .fc-row.wrap{flex-wrap:wrap;gap:8px}
  .fc-node{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:10px 16px;min-width:100px;min-height:48px;
    background:var(--paper);
    border:1px solid var(--grey-1);
    border-radius:var(--radius);
    text-align:center;
  }
  .fc-node .fc-num{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--blue);margin-bottom:2px}
  .fc-node .fc-label{font-size:12px;font-weight:600;color:var(--ink);line-height:1.3}
  .fc-node .fc-sub{font-size:10px;color:var(--grey-3);margin-top:1px}
  .fc-node.start{background:var(--blue);border-color:var(--blue)}
  .fc-node.start .fc-num,.fc-node.start .fc-label{color:#fff}
  .fc-node.start .fc-sub{color:rgba(255,255,255,.6)}
  .fc-node.gate{background:var(--red-light);border:1px dashed var(--red)}
  .fc-node.gate .fc-num,.fc-node.gate .fc-label{color:var(--red)}

  .fc-arrow{
    width:40px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .fc-arrow svg{display:block}

  /* ── 流程内分叉行 ── */
  .fc-branch{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
    position:relative;
  }
  .fc-branch .fc-branch-col{
    display:flex;flex-direction:column;align-items:center;gap:6px;
  }
  .fc-branch .fc-branch-tag{
    font-family:var(--mono);font-size:9px;font-weight:600;
    padding:2px 8px;border-radius:4px;
  }
  .fc-branch .fc-branch-tag.yes{background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-mid)}
  .fc-branch .fc-branch-tag.no{background:var(--red-light);color:var(--red);border:1px solid var(--red-mid)}
</style>
</head>
<body>

<!--
  ═══════════════════════════════════════════════════════════════
  系统结构图模板 · Swiss 风格 · 蓝+红双色 · 矩形圆角

  使用: 替换所有 {{PLACEHOLDER}}，按需选用组件。

  颜色语义:
  --blue #002FA7 : 结构/步骤/连接线/标题/阶段
  --red  #CC3333 : 门禁/否决/红线/阻断/FAIL 分支

  ═══════════════════════════════════════════════════════════════
  组件索引
  ═══════════════════════════════════════════════════════════════

  [布局容器]
  hero            必须。技能名 + 一句话 + KPI 数字
  pipeline-wrap   流水线全宽容器。侧栏信息移到底部 meta-row 横排

  [线性流水线] — 单方向步骤推进
  step-card       步骤卡片。含编号+标题+元信息+描述
  connector       步骤间 SVG 几何连线 (竖线 + 向下箭头)
  gate-card       门禁卡片。红色虚线边框 + 图标 + 标题 + 详情

  [分支 & 决策] — 条件判断 → 两条路径
  decision-node   决策节点。蓝色边框 + "?" 图标 + 判断条件描述
  branch-from     分叉连线 SVG (T/Y 型：一条线分两路)
  branch-split    分支容器 (2 列 grid，可加 .col3 变 3 列)
  branch-path     单条分支路径 (列内垂直排列 step-card / gate-card)
  branch-label    分支标签 (YES/NO · 通过/阻断 · 真/假)
  branch-to       汇合连线 SVG (倒 T/Y 型：两路合一路)

  [并行执行] — 多任务同时进行
  parallel-row    并行卡片行 (3 列 grid，可 .col2 / .col4)
  parallel-card   单张并行卡片 (编号 + 标题 + 描述 + 元信息)

  [回环 & 反馈] — 从后往前反馈
  loop-back       回环连线。SVG 曲线 + 标签 (自迭代/反馈/重试)

  [阶段分组] — 色块区分不同阶段 (social-image-publisher 风格)
  phase-group     阶段容器。.blue (蓝色) / .red (红色门禁)
  phase-header    阶段标题栏 (含阶段标签 + 阶段名)
  phase-body      阶段内容区 (内含 step-card / gate-card / parallel-row 等)

  [侧栏组件]
  side-panel      侧栏面板容器
  folder-tree     目录结构展示
  tt              数据表

  [底部扩展]
  below-panels    底部面板容器 (可堆叠多个 info-panel)
  info-panel      信息面板容器
  card-grid       卡片网格 (3列默认, .col2 .col4 变体)
  info-card       单张信息卡片
  info-card.red-line  红线卡片 (红左边框)
  stat-bar        底部 KPI 统计条

  [流程图嵌入]
  flow-row        横排流程图 (节点 + 箭头，水平方向)
  flow-node       横排流程节点
  embedded-flowchart  纵向嵌入流程图容器
  fc-row          流程图内行
  fc-node         流程图内节点
  fc-branch       流程图内分叉 (2 列)

  ═══════════════════════════════════════════════════════════════
  步骤字段规范 (step-body 内):
  h3          — 步骤标题
  .step-meta  — 元信息行: <span class="in">← input</span> <span class="out">→ output</span>
  .step-desc  — 步骤描述

  几何连线规范:
  connector   — 竖线 + 向下箭头 (两步骤之间)
  branch-from — Y 分叉 (决策后一分二)
  branch-to   — 倒 Y 汇合 (二合一)
  loop-back   — 弯曲回环 (底部回到上方)

  阶段颜色:
  .phase-group        — 默认灰色边框
  .phase-group.blue   — 蓝色头部 (正常阶段)
  .phase-group.red    — 红色头部 (门禁/阻断阶段)
  ═══════════════════════════════════════════════════════════════
-->

<!-- ═══════════ 流水线 (全宽) ═══════════ -->
<div class="pipeline-wrap">

  <div class="pipeline">

    <!--
    ═══════════════════════════════════════════════════
    模式 1: 线性流水线 (单方向步骤推进)
    适合: 无分支的管道流程, 步骤 A→B→C→D
    ═══════════════════════════════════════════════════

    [步骤卡片]
    <div class="step-card">
      <div class="step-num">01</div>
      <div class="step-body">
        <h3>步骤标题</h3>
        <div class="step-meta">
          <span class="in">← input-file.md</span>
          <span class="out">→ output-file.md</span>
        </div>
        <div class="step-desc">步骤描述 — 做什么、怎么做、什么角色执行。</div>
      </div>
      <div class="step-role">executor</div>
    </div>

    [几何连线]
    <div class="connector">
      <svg width="12" height="28" viewBox="0 0 12 28">
        <line x1="6" y1="0" x2="6" y2="22" stroke="var(--blue)" stroke-width="1.5"/>
        <polygon points="3,20 6,26 9,20" fill="var(--blue)"/>
      </svg>
    </div>

    [门禁卡片]
    <div class="gate-card">
      <div class="gate-icon">!</div>
      <div class="gate-body">
        <div class="gtag">硬阻断</div>
        <div class="gtitle">门禁标题 — 不通过的后果</div>
        <div class="gdetail">门禁细节描述 — 检查什么、怎么判、失败后怎么办。</div>
      </div>
    </div>

    [红色连线 (门禁后)]
    <div class="connector red">
      <svg width="12" height="28" viewBox="0 0 12 28">
        <line x1="6" y1="0" x2="6" y2="22" stroke="var(--red)" stroke-width="1.5"/>
        <polygon points="3,20 6,26 9,20" fill="var(--red)"/>
      </svg>
    </div>
    -->

    <!--
    ═══════════════════════════════════════════════════
    模式 2: 决策分支 (条件判断 → 两条路径 → 汇合)
    适合: "如果 A 则走左, 否则走右" 的分支逻辑
    ═══════════════════════════════════════════════════

    [决策节点]
    <div class="decision-node">
      <div class="dec-icon">?</div>
      <div class="dec-body">
        <h3>判断条件 — 这里写要判断什么</h3>
        <div class="dec-desc">判断逻辑描述。哪些条件为真走左路, 哪些为假走右路。</div>
      </div>
    </div>

    [分叉连线 — Y 型, 一条线分两路]
    <div class="branch-from">
      <svg width="100%" height="36" viewBox="0 0 800 36" preserveAspectRatio="none">
        <!-- 中线下拉 -->
        <line x1="400" y1="0" x2="400" y2="16" stroke="var(--blue)" stroke-width="1.5"/>
        <!-- 横线 -->
        <line x1="200" y1="16" x2="600" y2="16" stroke="var(--blue)" stroke-width="1.5"/>
        <!-- 左路下箭头 -->
        <line x1="200" y1="16" x2="200" y2="34" stroke="var(--blue)" stroke-width="1.5"/>
        <polygon points="197,28 200,34 203,28" fill="var(--blue)"/>
        <!-- 右路下箭头 -->
        <line x1="600" y1="16" x2="600" y2="34" stroke="var(--blue)" stroke-width="1.5"/>
        <polygon points="597,28 600,34 603,28" fill="var(--blue)"/>
      </svg>
    </div>

    [分支容器 — 2 列]
    <div class="branch-split">
      <div class="branch-path">
        <div class="branch-label">条件为真 · 通过</div>
        [放 step-card / gate-card]
      </div>
      <div class="branch-path">
        <div class="branch-label red">条件为假 · 阻断</div>
        [放 step-card / gate-card]
      </div>
    </div>

    [汇合连线 — 倒 Y 型, 两路合一路]
    <div class="branch-to">
      <svg width="100%" height="36" viewBox="0 0 800 36" preserveAspectRatio="none">
        <!-- 左路上拉 -->
        <line x1="200" y1="0" x2="200" y2="16" stroke="var(--blue)" stroke-width="1.5"/>
        <!-- 右路上拉 -->
        <line x1="600" y1="0" x2="600" y2="16" stroke="var(--blue)" stroke-width="1.5"/>
        <!-- 横线 -->
        <line x1="200" y1="16" x2="600" y2="16" stroke="var(--blue)" stroke-width="1.5"/>
        <!-- 中线下箭头 -->
        <line x1="400" y1="16" x2="400" y2="34" stroke="var(--blue)" stroke-width="1.5"/>
        <polygon points="397,28 400,34 403,28" fill="var(--blue)"/>
      </svg>
    </div>
    -->

    <!--
    ═══════════════════════════════════════════════════
    模式 3: 并行执行 (多任务同时运行)
    适合: Phase 3 三平台同时发布、多服务并行启动
    ═══════════════════════════════════════════════════

    [并行卡片行]
    <div class="parallel-row">
      <div class="parallel-card">
        <div class="pc-num">A</div>
        <div class="pc-title">并行任务 A</div>
        <div class="pc-desc">任务描述。做什么、什么角色执行。</div>
        <div class="pc-meta">max 3 retries</div>
      </div>
      <div class="parallel-card">
        <div class="pc-num">B</div>
        <div class="pc-title">并行任务 B</div>
        <div class="pc-desc">任务描述。做什么、什么角色执行。</div>
        <div class="pc-meta">max 3 retries</div>
      </div>
      <div class="parallel-card">
        <div class="pc-num">C</div>
        <div class="pc-title">并行任务 C</div>
        <div class="pc-desc">任务描述。做什么、什么角色执行。</div>
        <div class="pc-meta">max 3 retries</div>
      </div>
    </div>

    并行卡片换行用 .col2 或 .col4:
    <div class="parallel-row col2">...</div>
    <div class="parallel-row col4">...</div>
    -->

    <!--
    ═══════════════════════════════════════════════════
    模式 4: 回环连线 (从后一步反馈到前一步)
    适合: 自迭代、重试机制、反馈闭环
    ═══════════════════════════════════════════════════

    [回环 — 从当前步骤回到上方决策/步骤]
    <div class="loop-back">
      <div class="loop-path">
        <svg width="100%" height="48" viewBox="0 0 800 48" preserveAspectRatio="none">
          <!-- 右侧上升线 -->
          <line x1="760" y1="44" x2="760" y2="20" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="4,3"/>
          <!-- 顶部右到左横线 -->
          <line x1="200" y1="20" x2="760" y2="20" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="4,3"/>
          <!-- 左侧箭头下行 -->
          <line x1="200" y1="20" x2="200" y2="44" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="4,3"/>
          <polygon points="197,38 200,44 203,38" fill="var(--red)"/>
        </svg>
      </div>
      <div class="loop-label">自迭代反馈 · 读取 audit-log.jsonl</div>
    </div>
    -->

    <!--
    ═══════════════════════════════════════════════════
    模式 5: 阶段分组 (色块区分, social-image-publisher 风格)
    适合: 多阶段流程, 每阶段内部有子步骤
    ═══════════════════════════════════════════════════

    [蓝色阶段 — 正常处理阶段]
    <div class="phase-group blue">
      <div class="phase-header">
        <span class="phase-tag">PHASE 1</span> 内容检查
      </div>
      <div class="phase-body">
        [放 step-card / gate-card / parallel-row]
      </div>
    </div>

    [红色阶段 — 门禁/阻断阶段]
    <div class="phase-group red">
      <div class="phase-header">
        <span class="phase-tag">GATE</span> 硬阻断
      </div>
      <div class="phase-body">
        [放 gate-card]
      </div>
    </div>

    阶段之间用 connector 连接:
    <div class="connector">
      <svg width="12" height="28" viewBox="0 0 12 28">
        <line x1="6" y1="0" x2="6" y2="22" stroke="var(--blue)" stroke-width="1.5"/>
        <polygon points="3,20 6,26 9,20" fill="var(--blue)"/>
      </svg>
    </div>
    -->

    <!--
    ═══════════════════════════════════════════════════
    模式 6: 阶段 + 分支组合 (阶段内分支)
    在 phase-body 内使用 decision-node + branch-split
    ═══════════════════════════════════════════════════

    <div class="phase-group blue">
      <div class="phase-header">
        <span class="phase-tag">PHASE 2</span> 环境准备
      </div>
      <div class="phase-body">
        <div class="step-card">...</div>
        <div class="connector">...</div>
        <div class="decision-node">...</div>
        <div class="branch-from">...</div>
        <div class="branch-split">
          <div class="branch-path">
            <div class="branch-label">就绪</div>
            <div class="step-card">...</div>
          </div>
          <div class="branch-path">
            <div class="branch-label red">未就绪</div>
            <div class="gate-card">...</div>
          </div>
        </div>
      </div>
    </div>
    -->

    {{PIPELINE_CONTENT}}

  </div>

  <!--
  ═══════════════════════════════════════════════════
  模式 7: 嵌入流程图 (精确流程逻辑)
  适合: 需要精确表达分支条件的流程图
  ═══════════════════════════════════════════════════

  [横排流程图 — 水平方向]
  <div class="info-panel">
    <div class="panel-head">流程图</div>
    <div class="flow-row">
      <div class="flow-node first">
        <div class="fn-title">开始</div>
        <div class="fn-sub">触发条件</div>
      </div>
      <div class="flow-connector">
        <svg width="40" height="12" viewBox="0 0 40 12">
          <line x1="0" y1="6" x2="32" y2="6" stroke="var(--blue)" stroke-width="1.5"/>
          <polygon points="30,3 36,6 30,9" fill="var(--blue)"/>
        </svg>
      </div>
      <div class="flow-node">
        <div class="fn-title">Step 2<br>名称</div>
        <div class="fn-sub">描述</div>
      </div>
      <div class="flow-connector">
        <svg width="40" height="12" viewBox="0 0 40 12">
          <line x1="0" y1="6" x2="32" y2="6" stroke="var(--blue)" stroke-width="1.5"/>
          <polygon points="30,3 36,6 30,9" fill="var(--blue)"/>
        </svg>
      </div>
      <div class="flow-node danger">
        <div class="fn-title">门禁</div>
        <div class="fn-sub">阻断条件</div>
      </div>
    </div>
  </div>

  [嵌入流程图 — 纵向, 含分支]
  <div class="info-panel">
    <div class="panel-head">流程图 · 纵向嵌入</div>
    <div class="embedded-flowchart">
      <div class="fc-title">完整流程</div>

      <div class="fc-row">
        <div class="fc-node start">
          <div class="fc-label">输入</div>
          <div class="fc-sub">用户文本 + 图片</div>
        </div>
        <div class="fc-arrow">
          <svg width="40" height="12" viewBox="0 0 40 12">
            <line x1="0" y1="6" x2="32" y2="6" stroke="var(--blue)" stroke-width="1.5"/>
            <polygon points="30,3 36,6 30,9" fill="var(--blue)"/>
          </svg>
        </div>
        <div class="fc-node">
          <div class="fc-num">1.1</div>
          <div class="fc-label">文案门禁</div>
          <div class="fc-sub">标题≤20字</div>
        </div>
        <div class="fc-arrow">
          <svg width="40" height="12" viewBox="0 0 40 12">
            <line x1="0" y1="6" x2="32" y2="6" stroke="var(--blue)" stroke-width="1.5"/>
            <polygon points="30,3 36,6 30,9" fill="var(--blue)"/>
          </svg>
        </div>
        <div class="fc-node gate">
          <div class="fc-label">FAIL?</div>
          <div class="fc-sub">第4次→硬阻断</div>
        </div>
      </div>

      [分支行 — 2 列, 条件分叉]
      <div class="fc-branch" style="margin:12px 0">
        <div class="fc-branch-col">
          <div class="fc-branch-tag yes">PASS</div>
          <div class="fc-node">
            <div class="fc-label">下一阶段</div>
          </div>
        </div>
        <div class="fc-branch-col">
          <div class="fc-branch-tag no">FAIL</div>
          <div class="fc-node gate">
            <div class="fc-label">重试</div>
            <div class="fc-sub">max 3 retries</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  -->
