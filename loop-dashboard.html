<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Monitor — 联邦健康面板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Outfit:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f5;
  --bg-alt: #f5f4ed;
  --bg-card: #ffffff;
  --fg: #141413;
  --fg-2: #30302e;
  --fg-3: #5e5d59;
  --fg-dim: #94938d;
  --accent: #3b82f6;
  --accent-2: #2563eb;
  --accent-bg: rgba(59,130,246,0.06);
  --green: #3b7d4b;
  --green-bg: rgba(59,125,75,0.08);
  --yellow: #c7902b;
  --yellow-bg: rgba(199,144,43,0.08);
  --red: #c44e3e;
  --red-bg: rgba(196,78,62,0.06);
  --border: #e8e6dc;
  --border-light: #d1cfc5;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --f-display: "Source Serif 4", "Noto Serif SC", Georgia, serif;
  --f-heading: "Outfit", "Noto Sans SC", system-ui, sans-serif;
  --f-body: "DM Sans", "Noto Sans SC", system-ui, sans-serif;
  --f-mono: "IBM Plex Mono", "JetBrains Mono", monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--f-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.container { max-width: 1100px; margin: 0 auto; padding: 0 28px; }

/* ── Header ── */
.header { padding: 40px 0 0; }
.header-row { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px; }
.header h1 { font-family:var(--f-display); font-size:32px; font-weight:700; color:var(--fg); letter-spacing:-0.4px; line-height:1.15; }
.header h1 span { color:var(--accent); }
.header .tagline { font-size:14px; color:var(--fg-3); margin-top:4px; }
.header-actions { display:flex; gap:8px; align-items:center; padding-top:4px; }

.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:20px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:var(--f-body); transition:all 0.2s var(--ease); text-decoration:none; }
.btn-outline { background:var(--bg-card); border:1px solid var(--border); color:var(--fg-2); }
.btn-outline:hover { border-color:var(--border-light); background:var(--bg-alt); }
.btn-ghost { background:transparent; color:var(--fg-3); }
.btn-ghost:hover { color:var(--fg); background:var(--bg-alt); }

/* ── Status Banner ── */
.banner { margin-top:24px; padding:16px 20px; border-radius:var(--radius); font-size:14px; display:flex; align-items:center; gap:10px; }
.banner-healthy { background:var(--green-bg); color:var(--green); border:1px solid rgba(59,125,75,0.15); }
.banner-warn { background:var(--yellow-bg); color:var(--yellow); border:1px solid rgba(199,144,43,0.2); }
.banner-error { background:var(--red-bg); color:var(--red); border:1px solid rgba(196,78,62,0.15); }
.banner-icon { font-size:18px; flex-shrink:0; }
.banner-text strong { font-weight:600; }
.banner-text { color:var(--fg-2); }

/* ── Stat Strip ── */
.stat-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:24px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; box-shadow:var(--shadow-sm); transition:box-shadow 0.2s var(--ease); }
.stat-card:hover { box-shadow:var(--shadow); }
.stat-label { font-size:11px; font-weight:500; color:var(--fg-dim); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:6px; }
.stat-value { font-family:var(--f-display); font-size:36px; font-weight:700; color:var(--fg); line-height:1.1; }
.stat-sub { font-size:12px; color:var(--fg-3); margin-top:4px; }

/* ── Project Card ── */
.project-list { margin-top:28px; display:flex; flex-direction:column; gap:14px; }
.project-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-sm); overflow:hidden; transition:box-shadow 0.2s var(--ease); }
.project-card:hover { box-shadow:var(--shadow); }

.project-summary { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; cursor:pointer; user-select:none; }
.project-summary:hover { background:var(--bg-alt); }
.project-summary .left { display:flex; align-items:center; gap:16px; }
.project-avatar { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-family:var(--f-heading); font-weight:700; font-size:16px; color:#fff; letter-spacing:-0.5px; flex-shrink:0; }
.project-meta .name { font-size:16px; font-weight:600; color:var(--fg); letter-spacing:-0.2px; }
.project-meta .domain { font-size:13px; color:var(--fg-3); margin-top:1px; }
.project-meta .local-path { font-size:11px; font-family:var(--f-mono); color:var(--accent); margin-top:2px; cursor:pointer; max-width:420px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; transition:color 0.15s; }
.project-meta .local-path:hover { color:var(--accent-2); text-decoration:underline; }
.project-summary .right { display:flex; align-items:center; gap:12px; }
.health-score { font-family:var(--f-mono); font-size:13px; font-weight:500; color:var(--fg-2); }
.health-bar { width:80px; height:4px; border-radius:2px; background:var(--border); overflow:hidden; }
.health-bar-fill { height:100%; border-radius:2px; transition:width 0.4s var(--ease); }
.health-bar-fill.good { background:var(--green); }
.health-bar-fill.warn { background:var(--yellow); }
.health-bar-fill.bad { background:var(--red); }
.expand-icon { color:var(--fg-dim); transition:transform 0.25s var(--ease); }
.project-card.open .expand-icon { transform:rotate(180deg); }

/* ── Expanded Detail ── */
.project-detail { display:none; border-top:1px solid var(--border); padding:24px; background:var(--bg-alt); }
.project-card.open .project-detail { display:block; }

/* Today Row */
.today-strip { display:flex; gap:10px; margin-bottom:20px; }
.today-item { flex:1; background:var(--bg-card); border-radius:var(--radius-sm); padding:14px 16px; text-align:center; border:1px solid var(--border); }
.today-item .t-num { font-family:var(--f-display); font-size:24px; font-weight:700; color:var(--fg); }
.today-item .t-label { font-size:11px; color:var(--fg-dim); margin-top:2px; }
.today-item a { color:var(--accent); font-size:12px; text-decoration:none; display:inline-block; margin-top:4px; }
.today-item a:hover { text-decoration:underline; }

/* Component Grid */
.section-label { font-size:11px; font-weight:600; color:var(--fg-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; }
.comp-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:20px; }
.comp-cell { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 16px; }
.comp-cell .c-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.comp-cell .c-num { font-family:var(--f-mono); font-size:10px; color:var(--fg-dim); }
.comp-cell .c-status { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.comp-cell .c-status.ok { background:var(--green); }
.comp-cell .c-status.warn { background:var(--yellow); }
.comp-cell .c-status.missing { background:var(--red); }
.comp-cell .c-name { font-size:14px; font-weight:600; color:var(--fg); margin-bottom:2px; }
.comp-cell .c-stars { font-family:var(--f-mono); font-size:11px; margin-bottom:4px; }
.comp-cell .c-detail { font-size:11px; color:var(--fg-3); line-height:1.4; }
.comp-cell.is-missing { background:var(--red-bg); border-color:rgba(196,78,62,0.15); }
.comp-cell.is-warn { background:var(--yellow-bg); border-color:rgba(199,144,43,0.2); }

/* Escalation strip */
.esc-strip { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--bg-card); border-radius:var(--radius-sm); border:1px solid var(--border); margin-bottom:16px; font-size:13px; }
.esc-strip .esc-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.esc-strip .esc-dot.clear { background:var(--green); }
.esc-strip .esc-dot.active { background:var(--red); }
.esc-strip .esc-label { color:var(--fg-2); }
.esc-strip .esc-val { color:var(--fg-3); }

/* Audit footer */
.audit-line { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--fg-dim); }
.audit-line .sep { color:var(--border-light); }

/* Empty state */
.empty { text-align:center; padding:80px 20px; }
.empty .empty-icon { font-size:40px; margin-bottom:16px; }
.empty h2 { font-family:var(--f-display); font-size:20px; color:var(--fg-2); margin-bottom:6px; }
.empty p { font-size:14px; color:var(--fg-3); max-width:440px; margin:0 auto; line-height:1.6; }

/* Footer */
.footer { margin-top:40px; padding:24px 0 40px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--fg-dim); flex-wrap:wrap; gap:8px; }
.footer a { color:var(--accent); text-decoration:none; }
.footer .dot { color:var(--border-light); margin:0 6px; }

@media(max-width:860px) { .comp-grid{grid-template-columns:repeat(2,1fr)} .stat-strip{grid-template-columns:repeat(2,1fr)} }
@media(max-width:520px) { .comp-grid{grid-template-columns:1fr} .stat-strip{grid-template-columns:1fr} .today-strip{flex-wrap:wrap} }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-row">
      <div>
        <h1>Loop <span>Monitor</span></h1>
        <div class="tagline">联邦健康面板 — 各项目自评，此处只读</div>
      </div>
      <div class="header-actions">
        <span id="updateTime" style="font-size:13px;color:var(--fg-dim);font-family:var(--f-mono)">--</span>
        <button class="btn btn-outline" onclick="refresh()">刷新</button>
        <a href="/" class="btn btn-ghost">← 工具架</a>
      </div>
    </div>
  </div>

  <div id="banner"></div>
  <div class="stat-strip" id="stats"></div>
  <div class="project-list" id="projects"></div>

  <div class="footer">
    <span>数据来自各项目 <code style="font-family:var(--f-mono);font-size:11px">notebook/health.json</code> · 面板为纯读层，挂了不影响项目运行</span>
    <span>loop-audit v1.0 <span class="dot">·</span> agentboard</span>
  </div>
</div>

<script>
<!--LOOP_DATA_INJECT-->
if (!window.__loopData) { window.__loopData = { projects: [], updated: null }; }

function buildFromScan(p) {
  if (p.health) {
    p.health.path = p.path || "";
    p.health.project = p.name || p.health.project;
    p.health.url = p.url || p.health.url || "";
    return p.health;
  }
  return {
    project:p.name, url:"", avatar_bg:"#6b7280", avatar_text:(p.name||"??").substring(0,2).toUpperCase(),
    path:p.path||"",
    health:{
      alarm:{status:"missing",score:0,detail:"未配置"},
      workstation:{status:"missing",score:0,detail:"未配置"},
      knowledge:{status:p.hasClaude?"ok":"missing",score:p.hasClaude?2:0,detail:p.hasClaude?"CLAUDE.md 存在":"无 CLAUDE.md"},
      connectors:{status:"missing",score:0,detail:"未配置"},
      inspector:{status:"missing",score:0,detail:"未配置"},
      notebook:{status:"missing",score:0,detail:"无 health.json"},
      escalation:{status:"missing",score:0,detail:"未配置"},
      goals:{status:"missing",score:0,detail:"未配置"}
    },
    today:{jobs_total:0,jobs_completed:0,jobs_failed:0,last_run:"--",last_output:null},
    escalation:{active_alerts:0,last_escalated:null},
    audit_score:0, audit_date:"--"
  };
}

var SAMPLE_DEMO = [{
  project:"evopearl-data", url:"https://data.evopearl.com", avatar_bg:"#3b82f6", avatar_text:"ED",
  updated:"2026-06-15T08:35:00+08:00",
  health:{
    alarm:{status:"ok",score:2,detail:"3/3 jobs 按时触发 · 链式串行 · 失败自动重试"},
    workstation:{status:"ok",score:2,detail:"串行模式 · 链式依赖 · 无并行冲突"},
    knowledge:{status:"ok",score:2,detail:"CLAUDE.md 160行 · 踩坑警示 · 三层知识体系"},
    connectors:{status:"ok",score:2,detail:"GitHub · 飞书 · Vercel · 搜索API · 代理配置"},
    inspector:{status:"missing",score:0,detail:"无独立验证 · Agent 自行判断完成"},
    notebook:{status:"ok",score:3,detail:"state.json 驱动决策 · events.jsonl 完整事件流"},
    escalation:{status:"missing",score:0,detail:"失败静默 · 无飞书/邮件通知"},
    goals:{status:"warn",score:1,detail:"完成标准为自然语言 · 无降级方案"}
  },
  today:{jobs_total:3,jobs_completed:3,jobs_failed:0,last_run:"08:35 CST",last_output:"https://data.evopearl.com/data/deep-read/2026-06-15.json"},
  escalation:{active_alerts:0,last_escalated:null},
  audit_score:1.75, audit_date:"2026-06-15"
}];

var SCORE_MAP = {0:"★☆☆",1:"★☆☆",2:"★★☆",3:"★★★"};
function starColor(s) { return s>=3?'var(--green)':s>=2?'var(--yellow)':'var(--red)'; }
function avgHealth(h){var ks=Object.keys(h),s=0;ks.forEach(function(k){s+=h[k].score});return (s/ks.length).toFixed(1);}
function cntStatus(h,st){return Object.keys(h).filter(function(k){return h[k].status===st}).length;}

var LIVE_DATA = [];

function refresh() {
  fetch('/api/loop/health')
    .then(function(r){return r.json();})
    .then(function(d){
      LIVE_DATA = (d.projects||[]).map(buildFromScan).filter(Boolean);
      document.getElementById('updateTime').textContent = new Date(d.updated).toLocaleString('zh-CN',{hour12:false});
      render();
    })
    .catch(function(){ LIVE_DATA = SAMPLE_DEMO; render(); });
}

function openLocalFolder(p) {
  fetch('/api/open-folder?path=' + encodeURIComponent(p))
    .then(function(r){ return r.json(); })
    .then(function(d){ if (d.error) alert(d.error); })
    .catch(function(e){ alert('打开失败: ' + e.message); });
}

function render() {
  var data = LIVE_DATA.length>0 ? LIVE_DATA : SAMPLE_DEMO;
  var el = document.getElementById('updateTime');
  if (!el.textContent || el.textContent==='--') el.textContent = new Date().toLocaleString('zh-CN',{hour12:false});

  var totalP=data.length, totalJ=0, doneJ=0, failJ=0, missC=0, warnC=0, alertC=0;
  data.forEach(function(p){
    totalJ+=p.today.jobs_total; doneJ+=p.today.jobs_completed; failJ+=p.today.jobs_failed;
    missC+=cntStatus(p.health,'missing'); warnC+=cntStatus(p.health,'warn');
    alertC+=p.escalation.active_alerts;
  });
  var allOk = missC===0&&warnC===0&&failJ===0;
  var hasIssues = missC>0||failJ>0;

  // Banner
  var banner = document.getElementById('banner');
  if (data.length===0) {
    banner.innerHTML = '';
  } else if (allOk) {
    banner.className='banner banner-healthy';
    banner.innerHTML = '<span class="banner-icon">&#9670;</span><div class="banner-text"><strong>联邦健康</strong> — 所有项目运行正常，无缺失组件，无失败任务</div>';
  } else if (hasIssues) {
    banner.className='banner banner-error';
    banner.innerHTML = '<span class="banner-icon">&#9670;</span><div class="banner-text"><strong>需要关注</strong> — '+missC+' 个组件缺失，'+failJ+' 个任务失败</div>';
  } else {
    banner.className='banner banner-warn';
    banner.innerHTML = '<span class="banner-icon">&#9670;</span><div class="banner-text"><strong>部分注意</strong> — '+warnC+' 个组件需改进</div>';
  }

  // Stats
  var taskColor = failJ>0 ? 'var(--red)' : (doneJ===totalJ && totalJ>0 ? 'var(--green)' : 'var(--fg)');
  var healthColor = missC>0 ? 'var(--red)' : (warnC>0 ? 'var(--yellow)' : 'var(--green)');
  var healthVal = missC>0 ? missC : (warnC>0 ? warnC : '全');
  var healthSub = missC>0 ? '个缺失 · ' : '';
  var healthSub2 = warnC>0 ? warnC+' 个需改进' : '';
  var healthSub3 = (missC===0 && warnC===0) ? '全部组件就位' : '';
  var alertColor = alertC>0 ? 'var(--red)' : 'var(--green)';
  var alertVal = alertC>0 ? alertC : 0;
  var alertSub = alertC>0 ? '条待确认' : '无待处理事项';
  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="stat-label">联邦项目</div><div class="stat-value">'+totalP+'</div><div class="stat-sub">个循环项目运行中</div></div>'+
    '<div class="stat-card"><div class="stat-label">今日任务</div><div class="stat-value" style="color:'+taskColor+'">'+doneJ+'/'+totalJ+'</div><div class="stat-sub">完成 / 总计 · '+failJ+' 失败</div></div>'+
    '<div class="stat-card"><div class="stat-label">组件健康</div><div class="stat-value" style="color:'+healthColor+'">'+healthVal+'</div><div class="stat-sub">'+healthSub+healthSub2+healthSub3+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">提报状态</div><div class="stat-value" style="color:'+alertColor+'">'+alertVal+'</div><div class="stat-sub">'+alertSub+'</div></div>';

  // Projects
  var html = '';
  if (data.length===0) {
    html = '<div class="empty"><div class="empty-icon">&#9670;</div><h2>暂无循环项目</h2><p>运行 <code style="font-family:var(--f-mono);font-size:13px;background:var(--bg-alt);padding:2px 6px;border-radius:4px">loop-audit</code> 审计任意项目，审计通过后将自动加入此面板。<br>项目需具备 <code style="font-family:var(--f-mono);font-size:13px;background:var(--bg-alt);padding:2px 6px;border-radius:4px">CLAUDE.md</code> 宪法文件和 <code style="font-family:var(--f-mono);font-size:13px;background:var(--bg-alt);padding:2px 6px;border-radius:4px">notebook/health.json</code> 健康数据。</p></div>';
  }
  data.forEach(function(p,pi){
    var avg = avgHealth(p.health);
    var overall = avg>=2.5?'ok':avg>=1.5?'warn':'err';
    var miss = cntStatus(p.health,'missing');

    html += '<div class="project-card" id="proj-'+pi+'">';
    // Summary row
    html += '<div class="project-summary" onclick="document.getElementById(\'proj-'+pi+'\').classList.toggle(\'open\')">';
    html += '<div class="left">';
    html += '<div class="project-avatar" style="background:'+p.avatar_bg+'">'+p.avatar_text+'</div>';
    html += '<div class="project-meta"><div class="name">'+p.project+'</div><div class="domain">'+(p.url||'')+'</div>'+(p.path?'<div class="local-path" onclick="event.stopPropagation();openLocalFolder(\''+p.path.replace(/\\/g,'\\\\')+'\')" title="打开本地文件夹">'+p.path+'</div>':'')+'</div>';
    html += '</div>';
    html += '<div class="right">';
    html += '<span class="health-score">'+avg+' / 3</span>';
    html += '<div class="health-bar"><div class="health-bar-fill '+(avg>=2.5?'good':avg>=1.5?'warn':'bad')+'" style="width:'+(avg/3*100)+'%"></div></div>';
    if (miss>0) html += '<span style="font-size:11px;color:var(--red);font-weight:500">'+miss+' 缺失</span>';
    html += '<span class="expand-icon">&#9660;</span>';
    html += '</div></div>';

    // Detail
    html += '<div class="project-detail">';

    // Today
    html += '<div class="today-strip">';
    html += '<div class="today-item"><div class="t-num">'+p.today.jobs_completed+'/'+p.today.jobs_total+'</div><div class="t-label">今日完成/总计</div></div>';
    var failClr = p.today.jobs_failed>0 ? 'var(--red)' : 'var(--green)';
    html += '<div class="today-item"><div class="t-num" style="color:'+failClr+'">'+p.today.jobs_failed+'</div><div class="t-label">失败</div></div>';
    html += '<div class="today-item"><div class="t-num" style="font-family:var(--f-mono);font-size:16px">'+p.today.last_run+'</div><div class="t-label">最后运行</div></div>';
    html += '<div class="today-item">'+(p.today.last_output?'<a href="'+p.today.last_output+'" target="_blank">最新产出 →</a>':'<span style="color:var(--fg-dim);font-size:13px">无产出</span>')+'<div class="t-label">产出链接</div></div>';
    html += '</div>';

    // Escalation
    html += '<div class="esc-strip">';
    html += '<span class="esc-dot '+(p.escalation.active_alerts>0?'active':'clear')+'"></span>';
    html += '<span class="esc-label">提报通道</span>';
    html += '<span class="esc-val">'+(p.health.escalation.status==='missing'?'未配置':'飞书 Webhook')+'</span>';
    html += '<span style="color:var(--border-light);margin:0 4px;">·</span>';
    html += '<span class="esc-label">待确认</span>';
    var escClr = p.escalation.active_alerts>0 ? 'var(--red)' : 'var(--green)';
    var escVal = p.escalation.active_alerts>0 ? p.escalation.active_alerts+' 条' : '无';
    html += '<span class="esc-val" style="font-weight:600;color:'+escClr+'">'+escVal+'</span>';
    html += '<span style="color:var(--border-light);margin:0 4px;">·</span>';
    html += '<span class="esc-label">最后提报</span><span class="esc-val">'+(p.escalation.last_escalated||'从未')+'</span>';
    html += '</div>';

    // 8 Components
    html += '<div class="section-label">8 组件健康</div>';
    html += '<div class="comp-grid">';
    [{num:1,name:'闹钟',key:'alarm'},{num:2,name:'工位',key:'workstation'},{num:3,name:'知识管理',key:'knowledge'},{num:4,name:'电话线',key:'connectors'},{num:5,name:'质检员',key:'inspector'},{num:6,name:'记事本',key:'notebook'},{num:7,name:'提报',key:'escalation'},{num:8,name:'目标定义',key:'goals'}].forEach(function(c){
      var h = p.health[c.key];
      var isMiss = h.status==='missing', isWarn = h.status==='warn';
      var cls = isMiss?'is-missing':isWarn?'is-warn':'';
      html += '<div class="comp-cell '+cls+'">';
      html += '<div class="c-head"><span class="c-num">#'+c.num+'</span><span class="c-status '+h.status+'"></span></div>';
      html += '<div class="c-name">'+c.name+'</div>';
      html += '<div class="c-stars" style="color:'+starColor(h.score)+'">'+(SCORE_MAP[h.score]||'★☆☆')+'</div>';
      html += '<div class="c-detail">'+h.detail+'</div>';
      html += '</div>';
    });
    html += '</div>';

    html += '<div class="audit-line">审计日期 <span class="sep">·</span> '+p.audit_date+' <span class="sep">·</span> 均分 '+p.audit_score+'/3 <span class="sep">·</span> loop-audit v1.0</div>';
    html += '</div></div>';
  });
  document.getElementById('projects').innerHTML = html;
}

// Init
if (window.__loopData && window.__loopData.projects && window.__loopData.projects.length>0) {
  LIVE_DATA = window.__loopData.projects.map(buildFromScan).filter(Boolean);
}
render();
</script>
</body>
</html>
