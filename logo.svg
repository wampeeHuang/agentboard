<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- body -->
  <rect x="16" y="24" width="96" height="80" rx="22" fill="#002FA7"/>

  <!-- shelf lines -->
  <rect x="26" y="66" width="76" height="5" rx="2.5" fill="rgba(255,255,255,0.35)"/>
  <rect x="26" y="88" width="76" height="5" rx="2.5" fill="rgba(255,255,255,0.14)"/>

  <!-- tool silhouettes -->
  <rect x="32" y="52" width="14" height="14" rx="3" fill="rgba(255,255,255,0.35)" transform="rotate(-10 39 59)"/>
  <circle cx="60" cy="59" r="8" fill="rgba(255,255,255,0.35)"/>
  <rect x="78" y="56" width="6" height="10" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="72" y="52" width="18" height="5" rx="2.5" fill="rgba(255,255,255,0.35)"/>

  <!-- eyes -->
  <ellipse cx="48" cy="42" rx="9" ry="10" fill="white"/>
  <ellipse cx="80" cy="42" rx="9" ry="10" fill="white"/>

  <!-- pupils -->
  <circle cx="50" cy="43" r="4.5" fill="#002FA7"/>
  <circle cx="82" cy="43" r="4.5" fill="#002FA7"/>

  <!-- eye shine -->
  <circle cx="52" cy="41" r="2" fill="white"/>
  <circle cx="84" cy="41" r="2" fill="white"/>

  <!-- blush -->
  <ellipse cx="36" cy="50" rx="6" ry="4" fill="rgba(255,255,255,0.16)"/>
  <ellipse cx="92" cy="50" rx="6" ry="4" fill="rgba(255,255,255,0.16)"/>

  <!-- smile -->
  <path d="M56 54 Q64 62 72 54" stroke="rgba(255,255,255,0.63)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
