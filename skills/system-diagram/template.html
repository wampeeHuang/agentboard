<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{SKILL_NAME}} · 系统结构图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFAF8; --paper-rgb:250,250,248;
    --ink:#0A0A0A; --ink-rgb:10,10,10;
    --grey-0:#F2F2F0; --grey-1:#E8E8E4; --grey-2:#CFCFCB; --grey-3:#737373;
    --accent:#002FA7; --accent-rgb:0,47,167; --accent-on:#FFFFFF;
    --accent-light:rgba(0,47,167,.06); --accent-mid:rgba(0,47,167,.12);
    --accent-strong:rgba(0,47,167,.18);
    --kill:#CC3333; --kill-rgb:204,51,51; --kill-light:rgba(204,51,51,.06);
    --warn:#B8860B; --warn-light:rgba(184,134,11,.07);
    --sans:"Inter","Helvetica Neue","Helvetica","Arial","Segoe UI",system-ui,-apple-system,sans-serif;
    --sans-zh:"Noto Sans SC","PingFang SC","Microsoft YaHei UI","Microsoft YaHei","微软雅黑",sans-serif;
    --mono:"JetBrains Mono","IBM Plex Mono","SF Mono","Cascadia Code","Consolas",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--paper);color:var(--ink);font-family:var(--sans),var(--sans-zh);-webkit-font-smoothing:antialiased}
  body{max-width:1800px;margin:0 auto;padding:40px 48px 60px}

  .hero{background:var(--accent);color:var(--accent-on);padding:52px 56px;margin-bottom:36px;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:end}
  .hero .kicker{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:8px}
  .hero h1{font-size:clamp(48px,5.5vw,76px);font-weight:200;letter-spacing:-.02em;line-height:1.02;color:var(--accent-on)}
  .hero .deck{font-size:17px;font-weight:400;color:rgba(255,255,255,.65);margin-top:12px;max-width:650px;line-height:1.6}
  .hero .kpi-strip{display:flex;gap:48px;align-self:end}
  .hero .kpi-strip .kv{font-family:var(--mono);font-size:60px;font-weight:300;color:var(--accent-on);line-height:1;letter-spacing:-.03em}
  .hero .kpi-strip .kl{font-size:13px;color:rgba(255,255,255,.5);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}

  .main-grid{display:grid;grid-template-columns:1fr 360px;gap:36px;margin-bottom:36px}

  .panel{background:var(--grey-0);padding:24px;border-left:1px solid var(--accent)}
  .panel.clean{background:var(--paper);border-left:none}
  .panel-head{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid var(--accent)}

  /* Pipeline steps */
  .pipeline{position:relative}
  .step{margin-bottom:0;position:relative}
  .step-inner{display:grid;grid-template-columns:72px 1fr 130px;gap:18px;align-items:start;padding:12px 0}
  .step:last-child .step-inner{padding-bottom:0}

  .step-num{width:72px;height:72px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:26px;font-weight:500;color:var(--accent);border:1px solid var(--accent);background:var(--accent-light);flex-shrink:0}
  .step-num.spawn{color:var(--accent-on);background:var(--accent);border-color:var(--accent)}
  .step-num.pause{color:var(--warn);border-color:var(--warn);background:var(--warn-light)}
  .step-num.opt{color:var(--grey-3);border-color:var(--grey-2);border-style:dashed;background:transparent}

  .step-body h3{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:2px}
  .step-body .role{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:600;margin-bottom:4px}
  .step-body .desc{font-size:14px;color:var(--grey-3);line-height:1.5;font-weight:400}
  .step-body .out{font-family:var(--mono);font-size:11px;color:var(--grey-2);margin-top:4px;font-weight:500}

  /* Gate breaks */
  .gate-break{background:var(--kill-light);border-left:1px solid var(--kill);padding:14px 18px;margin:6px 0 6px 90px}
  .gate-break .gtag{display:inline-block;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--kill);background:rgba(204,51,51,.1);padding:3px 10px;margin-bottom:6px;letter-spacing:.06em}
  .gate-break .gtitle{font-size:14px;font-weight:700;color:var(--ink)}
  .gate-break .gdetail{font-size:13px;color:var(--grey-3);margin-top:3px;line-height:1.5}
  .gate-break .gitems{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
  .gate-break .gi{font-family:var(--mono);font-size:12px;color:var(--kill);font-weight:600}

  .gate-break.eng{background:var(--accent-light);border-left-color:var(--accent)}
  .gate-break.eng .gtag{color:var(--accent);background:var(--accent-mid)}
  .gate-break.eng .gi{color:var(--accent)}

  .gate-break.warn{background:var(--warn-light);border-left-color:var(--warn)}
  .gate-break.warn .gtag{color:var(--warn);background:rgba(184,134,11,.12)}
  .gate-break.warn .gi{color:var(--warn)}

  .pause-marker{margin:4px 0 4px 90px;padding:8px 14px;border-left:1px solid var(--warn);background:var(--warn-light)}
  .pause-marker .plabel{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--warn);letter-spacing:.06em}
  .pause-marker .ptext{font-size:12px;color:var(--grey-3);margin-top:2px}

  .side-stack{display:flex;flex-direction:column;gap:20px}

  /* Taxonomy table */
  .tt{width:100%;border-collapse:collapse;font-size:12px}
  .tt th{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);text-align:left;padding:6px 8px;border-bottom:1px solid var(--accent);letter-spacing:.06em;text-transform:uppercase}
  .tt td{padding:6px 8px;border-bottom:1px solid var(--grey-1);vertical-align:top;line-height:1.45}

  /* Folder tree */
  .folder-tree{font-family:var(--mono);font-size:13px;line-height:2.1;color:var(--ink)}
  .folder-tree .dir{color:var(--accent);font-weight:600}
  .folder-tree .file{color:var(--grey-3)}
  .folder-tree .comment{color:var(--grey-2);font-size:11px}
  .folder-tree .row{display:flex;align-items:baseline;position:relative;padding-left:0}
  .folder-tree .row .pre{color:var(--grey-2);white-space:pre;flex-shrink:0;user-select:none;margin-right:2px}
  .folder-tree .lv1{padding-left:4px}
  .folder-tree .lv2{padding-left:22px}
  .folder-tree .lv3{padding-left:40px}
  .folder-tree .lv4{padding-left:58px}

  /* Flowchart zigzag */
  .fc-wrap{background:var(--grey-0);padding:28px 0;margin-top:0}
  .fc-row{display:flex;align-items:stretch;gap:0;position:relative}
  .fc-node{flex:1;min-width:0;position:relative;padding:0 10px;display:flex;flex-direction:column}
  .fc-node .fc-box{background:var(--accent-light);border:1px solid var(--accent-mid);padding:14px 12px;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);line-height:1.35;text-align:center;flex:1}
  .fc-node .fc-box.gate{background:var(--accent);color:var(--accent-on);border-color:var(--accent)}
  .fc-node .fc-box.pause{background:var(--warn-light);color:var(--warn);border:1px dashed var(--warn)}
  .fc-node .fc-sub{font-size:11px;color:var(--grey-3);margin-top:5px;line-height:1.45;text-align:center}
  .fc-arrow-h{display:flex;align-items:center;justify-content:center;width:32px;flex-shrink:0;font-family:var(--mono);font-size:18px;color:var(--accent);font-weight:400;user-select:none}
  .fc-wrap-arrow{display:flex;align-items:center;justify-content:flex-end;padding:0 10px;height:32px;font-family:var(--mono);font-size:18px;color:var(--accent);font-weight:400;user-select:none}
  .fc-wrap-arrow.left{justify-content:flex-start}
  .fc-spacer{flex:1;min-width:0}

  .constraint-list{font-size:14px;line-height:1.8}
  .constraint-list li{margin-bottom:4px;padding-left:4px}
  .constraint-list li::marker{color:var(--accent);font-weight:700}

  .stat-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-top:1px solid var(--accent);border-bottom:1px solid var(--grey-1);margin-top:40px}
  .stat-bar .sc{padding:20px 22px;border-right:1px solid var(--grey-1);background:var(--grey-0)}
  .stat-bar .sc:last-child{border-right:none}
  .stat-bar .sc .sn{font-family:var(--mono);font-size:clamp(36px,3.5vw,52px);font-weight:300;color:var(--accent);line-height:1}
  .stat-bar .sc .sl{font-size:13px;color:var(--grey-3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
  .stat-bar .sc .sdetail{font-size:12px;color:var(--grey-2);margin-top:2px}
</style>
</head>
<body>

<!--
  GENERATION INSTRUCTIONS for AI agents:
  Read the skill's SKILL.md and fill in every {{PLACEHOLDER}} below.
  Delete this comment block before saving.

  HERO: skill name, one-line deck, 3-5 KPIs (number + label)
  PIPELINE: list each step with num, title, role, description.
    - .step-num: default (light blue) for normal steps
    - .step-num.spawn: solid blue for spawned sub-agents
    - .step-num.pause: yellow for human review pause points
    - .step-num.opt: grey dashed for optional steps
  GATE BREAKS: .gate-break (red, kill gate) or .gate-break.eng (blue, engineering gate) or .gate-break.warn (yellow, warning)
  RIGHT SIDEBAR: folder tree + any taxonomy/constraint/role panels
  STAT BAR: 5 summary stats (number + label + detail)
  FLOWCHART (optional): .fc-wrap with .fc-row for zigzag delivery chain
-->

<header class="hero">
  <div>
    <div class="kicker">Skill 系统结构图</div>
    <h1>{{SKILL_NAME}}</h1>
    <p class="deck">{{SKILL_DECK}}</p>
  </div>
  <div class="kpi-strip">
    {{KPI_STRIP}}
  </div>
</header>

<div class="main-grid">

  <!-- LEFT: Pipeline -->
  <div class="panel clean">
    <div class="panel-head">{{PIPELINE_HEADING}}</div>
    <div class="pipeline">
      {{PIPELINE_STEPS}}
    </div>
  </div>

  <!-- RIGHT: Sidebar -->
  <div class="side-stack">

    <!-- Folder structure -->
    <div class="panel">
      <div class="panel-head">Skill 目录结构</div>
      <div class="folder-tree">
        {{FOLDER_TREE}}
      </div>
    </div>

    {{SIDEBAR_PANELS}}

  </div>
</div>

{{FLOWCHART_SECTION}}

{{ADDITIONAL_SECTIONS}}

<div class="stat-bar">
  {{STAT_BAR}}
</div>

</body>
</html>
